<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de passwords</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>

    <main>
        <p>Generador de contraseñas</p>
        <section class="password" id="password">

        </section>
        <section class="formulario">
            <form action="">
                <p>Cantidad de caracteres: <span id="longitudTexto">8</span></p>
                <input type="range" id="rango" min="4" max="32" value="8"
                    oninput="document.getElementById('longitudTexto').innerText = this.value">
                <div class="selecctionar">
                    <input type="checkbox" name="mayuscula" id="mayuscula">
                    <label for="mayuscula">Incluye letras mayusculas</label>
                </div>
                <div class="selecctionar">
                    <input type="checkbox" name="minusculas" id="minusculas">
                    <label for="minusculas">Incluye letras minusculas</label>
                </div>
                <div class="selecctionar">
                    <input type="checkbox" name="numeros" id="numeros">
                    <label for="numeros">Incluye numeros</label>
                </div>
                <div class="selecctionar">
                    <input type="checkbox" name="simbolos" id="simbolos">
                    <label for="simbolos">Incluye simbolos</label>
                </div>
                <div class="segura">
                    <div class="segura_izquierda">
                        <p>SEGURA</p>
                    </div>
                    <div class="segura_derecha">
                        <p id="segura">MEDIUM</p>
                        <div class="fuerza" id="fuerza1">
                        </div>
                        <div class="fuerza" id="fuerza2">
                        </div>
                        <div class="fuerza" id=fuerza3>
                        </div>
                        <div class="fuerza" id=fuerza4>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="generarPassword()">Generar</button>
            </form>
        </section>
    </main>
</body>

</html>
